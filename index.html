<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora Hello Kitty 🐱</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e7,#fff0f6);
font-family:Arial,sans-serif;
}


.caixa{
width:340px;
background:white;
padding:20px;
border-radius:25px;
border:4px solid #ff69b4;
box-shadow:0 0 25px #ffb6d9;
}


.kitty{
width:160px;
height:160px;
object-fit:contain;
display:block;
margin:auto;
}


h2{
text-align:center;
color:#ff1493;
margin:10px;
}


.display{
width:100%;
height:70px;
background:#fff0f6;
border:none;
border-radius:15px;
font-size:32px;
text-align:right;
padding:15px;
margin-bottom:15px;
}


.botoes{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}


button{
height:60px;
border:none;
border-radius:15px;
font-size:22px;
font-weight:bold;
cursor:pointer;
}


.numero{
background:#ffe4f1;
}


.operador{
background:#ff69b4;
color:white;
}


.igual{
background:#ff1493;
color:white;
}


.limpar{
background:#ff8fab;
color:white;
}


</style>

</head>


<body>


<div class="caixa">


<img 
class="kitty"
src="hello-kitty.gif"
alt="Hello Kitty">


<h2>Calculadora 🐱</h2>


<input 
id="display"
class="display"
readonly>



<div class="botoes">


<button class="limpar" onclick="limpar()">C</button>
<button class="operador" onclick="add('(')">(</button>
<button class="operador" onclick="add(')')">)</button>
<button class="operador" onclick="add('/')">÷</button>


<button class="numero" onclick="add('7')">7</button>
<button class="numero" onclick="add('8')">8</button>
<button class="numero" onclick="add('9')">9</button>
<button class="operador" onclick="add('*')">×</button>


<button class="numero" onclick="add('4')">4</button>
<button class="numero" onclick="add('5')">5</button>
<button class="numero" onclick="add('6')">6</button>
<button class="operador" onclick="add('-')">−</button>


<button class="numero" onclick="add('1')">1</button>
<button class="numero" onclick="add('2')">2</button>
<button class="numero" onclick="add('3')">3</button>
<button class="operador" onclick="add('+')">+</button>


<button class="numero" onclick="add('0')">0</button>
<button class="numero" onclick="add('.')">.</button>
<button class="igual" onclick="calcular()">=</button>


</div>


</div>


<script>


let display =
document.getElementById("display");


function add(valor){
display.value += valor;
}


function limpar(){
display.value="";
}


function calcular(){

try{

display.value =
eval(display.value);

}

catch{

display.value="Erro";

}

}


document.addEventListener("keydown",function(e){

if(e.key==="Enter"){
calcular();
}

if(e.key==="Escape"){
limpar();
}

});


</script>


</body>

</html>
