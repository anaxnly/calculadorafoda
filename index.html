<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffd6e7,#fff0f6);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}


.container{
    background:white;
    width:450px;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(255,105,180,.3);
    border:4px solid #ff69b4;
    text-align:center;
}


.kitty{
    width:130px;
    height:auto;
}


h1{
    color:#ff1493;
}


input{

    width:90%;
    padding:12px;
    margin:8px;
    border:2px solid #ff69b4;
    border-radius:10px;
    font-size:16px;

}


button{

    background:#ff69b4;
    color:white;
    border:none;
    padding:12px 30px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;

}


button:hover{

    background:#ff1493;

}


.resultado{

    margin-top:20px;
    background:#fff0f6;
    padding:15px;
    border-radius:15px;

}


p{

    font-weight:bold;

}


</style>

</head>


<body>


<div class="container">


<img 
class="kitty"
src="https://p7.hiclipart.com/preview/578/42/410/computer-icons-hello-kitty-clip-art-others.jpg"
alt="imagem">


<h1>Calculadora</h1>



<input type="text" id="v1" placeholder="Digite o primeiro número">


<input type="text" id="v2" placeholder="Digite o segundo número">



<br>



<button onclick="calcular()">Calcular</button>




<div class="resultado">


<p id="p1"></p>

<p id="p2"></p>

<p id="p3"></p>

<p id="p4"></p>

<p id="p5"></p>


</div>


</div>




<script>



function pegarNumeros(){


    let v1 = Number(document.getElementById("v1").value);

    let v2 = Number(document.getElementById("v2").value);


    return {v1,v2};

}





function calcular(){


    let valores = pegarNumeros();


    let v1 = valores.v1;

    let v2 = valores.v2;



    if(isNaN(v1) || isNaN(v2)){


        alert("Digite somente números!");

        return;

    }




    document.getElementById("p1").innerHTML =
    "➕ Soma: " + (v1 + v2);




    document.getElementById("p2").innerHTML =
    "➖ Subtração: " + (v1 - v2);




    document.getElementById("p3").innerHTML =
    "✖ Multiplicação: " + (v1 * v2);




    if(v2 === 0){


        document.getElementById("p4").innerHTML =
        "❌ Erro: divisão por zero";


    }else{


        document.getElementById("p4").innerHTML =
        "➗ Divisão: " + (v1 / v2);


    }




    let comparacao;



    if(v1 > v2){

        comparacao = "v1 é maior que v2";

    }


    else if(v1 < v2){


        comparacao = "v1 é menor que v2";


    }


    else{


        comparacao = "v1 é igual a v2";


    }




    let parImpar = 
    (v1 % 2 === 0) ? "Par" : "Ímpar";





    document.getElementById("p5").innerHTML =

    comparacao + 
    "<br>O primeiro número é: " + parImpar;



}




</script>



</body>

</html>
